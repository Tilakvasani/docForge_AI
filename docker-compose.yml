version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docforge
      POSTGRES_PASSWORD: docforge
      POSTGRES_DB: docforge
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docforge"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    image: tilakvasani/docforge-backend:latest
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://docforge:docforge@postgres:5432/docforge
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  frontend:
    image: tilakvasani/docforge-frontend:latest
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      # M10 FIX: Use Docker service name for inter-container communication
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data: